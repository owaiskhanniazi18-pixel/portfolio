<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RankScribe - Professional Content Writing & SEO Services by Muhammad Owais">
    <title>RankScribe | Content Writing & SEO Specialist</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <!-- Previous sections (Header, Hero, Services, Work, About) remain the same -->

    <!-- Fixed Contact Section -->
    <section id="contact" class="py-20 bg-white">
        <div class="max-w-3xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-4">Let's Create High-Impact Content Together</h2>
            <p class="text-center text-gray-600 mb-12">Share your project details and get a response within 24 hours</p>
            
            <form id="contactForm" class="space-y-6 bg-white shadow-lg p-10 rounded-3xl">
                <div>
                    <label class="block text-sm font-medium mb-2">Your Name *</label>
                    <input type="text" name="name" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-600">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address *</label>
                    <input type="email" name="email" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-600">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Project Type</label>
                    <input type="text" name="project" placeholder="SEO Blog, AI Article, Healthcare Content etc."
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-600">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Project Details *</label>
                    <textarea name="message" rows="6" required
                              class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-indigo-600"
                              placeholder="Tell me about your content needs..."></textarea>
                </div>
                
                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-5 rounded-3xl text-lg transition">
                    Send Message
                </button>
            </form>
            
            <div class="text-center mt-10">
                <p class="text-gray-600">Or reach me directly:</p>
                <p class="text-xl font-semibold mt-2">0308 7068851</p>
                <p class="text-gray-600">owaiskhanniazi18@gmail.com</p>
            </div>
        </div>
    </section>

    <script>
        // Working Contact Form
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.querySelector('input[name="name"]').value;
            
            alert(`Thank you ${name}!\n\nYour message has been received.\nI will contact you shortly on 03087068851.`);
            
            // Reset form
            this.reset();
        });
    </script>
</body>
</html>
